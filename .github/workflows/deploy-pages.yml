# GitHub Pages: build Astro site and publish dist/ to the gh-pages branch.
#
# Site URL: https://<org>.github.io/<repo>/
#
# ONE-TIME (after the first successful workflow run):
#   Settings → Pages → Build and deployment
#   Source: Deploy from a branch
#   Branch: gh-pages / (root)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate entries
        run: python3 scripts/validate.py

      - name: Install and build
        run: npm ci && npm run build
        env:
          NODE_ENV: production
          GH_PAGES_BASE: ${{ github.event.repository.name }}
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: site build ${{ github.sha }}"
